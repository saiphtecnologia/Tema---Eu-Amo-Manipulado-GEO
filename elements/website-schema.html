<script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "{{ store.name | replace({'"': '\"'}) }}",
        "url": "{{ store.url }}",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "{{ links.search }}?loja={{ store.id }}&palavra_busca={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
</script>
